version: "3.8"

# 数据持久化：默认写入项目旁 ./data/，可通过环境变量 DATA_DIR 指向外挂盘，例如：
#   DATA_DIR=/mnt/ssd/memory-server-data docker compose up -d
# 首次启动前建议：mkdir -p "$DATA_DIR/qdrant" "$DATA_DIR/paradedb"

services:
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: memory-qdrant
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC API
    volumes:
      - ${DATA_DIR:-./data}/qdrant:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=DEBUG
    command: ./qdrant --config-path /qdrant/config/production.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  paradedb:
    image: paradedb/paradedb:latest-pg16
    container_name: memory-paradedb
    ports:
      - "5433:5432"   # 避免与宿主机已有 PostgreSQL 占用 5432
    volumes:
      - ${DATA_DIR:-./data}/paradedb:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
      POSTGRES_DB: memory_server
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d memory_server"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: memory-api
    ports:
      - "8899:8899"
    env_file:
      - .env
    environment:
      - PORT=8899
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DATABASE_URL=postgresql://memory:memory@paradedb:5432/memory_server
    depends_on:
      qdrant:
        condition: service_healthy
      paradedb:
        condition: service_healthy
    restart: unless-stopped
