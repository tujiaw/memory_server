version: "3.8"

# 数据目录：DATA_DIR 默认可为 ./data，需 elasticsearch、postgres 子目录
#   mkdir -p "$DATA_DIR/elasticsearch" "$DATA_DIR/postgres"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: memory-elasticsearch
    ports:
      - "9200:9200"
    volumes:
      - ${DATA_DIR:-./data}/elasticsearch:/usr/share/elasticsearch/data
    environment:
      - node.name=es01
      - cluster.name=memory-cluster
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=changeme
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -u elastic:changeme http://localhost:9200/_cluster/health | grep -q '\"status\"'",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    container_name: memory-postgres
    ports:
      - "5433:5432"
    volumes:
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
      POSTGRES_DB: memory_server
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d memory_server"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: memory-api
    ports:
      - "8899:8899"
    env_file:
      - .env
    environment:
      - PORT=8899
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - ELASTICSEARCH_USER=elastic
      - ELASTICSEARCH_PASSWORD=changeme
      - DATABASE_URL=postgresql://memory:memory@postgres:5432/memory_server
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
