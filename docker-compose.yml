version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: memory-qdrant
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=DEBUG
    command: ./qdrant --config-path /qdrant/config/production.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:8.0
    container_name: memory-mongodb
    ports:
      - "27017:27017"   # MongoDB
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=memory_server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:1.0
    container_name: memory-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongodb:27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
    depends_on:
      - mongodb
    restart: unless-stopped

  api:
    build: .
    container_name: memory-api
    ports:
      - "8899:8899"
    env_file:
      - .env
    environment:
      - PORT=8899
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MONGO_URI=mongodb://mongodb:27017
    depends_on:
      qdrant:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_storage:
    driver: local
  mongodb_data:
    driver: local
